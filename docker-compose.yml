services:
  redis:
    image: bitnami/redis:latest
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    restart: unless-stopped

  backend:
    image: agent-support-backend:latest
    build:
      context: ./customer_service_ai
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - chat_data:/app/data
    env_file:
      - ./customer_service_ai/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
    restart: unless-stopped

  worker:
    image: agent-support-backend:latest
    build:
      context: ./customer_service_ai
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker -l info -Q celery --concurrency=1
    volumes:
      - chat_data:/app/data
    env_file:
      - ./customer_service_ai/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
    restart: unless-stopped

  frontend:
    image: agent-support-frontend:latest
    build:
      context: ./chat-ui
      dockerfile: Dockerfile
    ports:
      - "8083:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chat_data:
