name: CI

on:
  push:
    branches: [master, dev-gzk, feat-*]
  pull_request:
    branches: [master]

jobs:
  backend-test:
    name: 后端测试
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: customer_service_ai

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行测试
        env:
          DEEPSEEK_API_KEY: test-dummy-key
          EMBEDDING_API_KEY: test-dummy-key
          ADMIN_PASSWORD: test
        run: python -m pytest tests/ -v --tb=short

  frontend-build:
    name: 前端构建
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chat-ui

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: chat-ui/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: TypeScript 类型检查
        run: npx tsc --noEmit

      - name: 构建
        run: npm run build

  docker-build:
    name: Docker 构建
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: 构建后端镜像
        run: docker build -t agent-support-backend:ci ./customer_service_ai

      - name: 构建前端镜像
        run: docker build -t agent-support-frontend:ci ./chat-ui
